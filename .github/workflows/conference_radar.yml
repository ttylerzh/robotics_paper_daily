name: Conference Radar (Monthly)

on:
  schedule:
    - cron: "0 0 1 * *"      # 1st of every month, UTC 00:00
  workflow_dispatch:
    inputs:
      year:
        description: "years"
        required: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create docs directory
        run: mkdir -p docs

      - name: Run PaperRadar with conferences
        run: |
          python paper_radar.py \
            --config      config.yaml \
            --output      README.md \
            --gitpage     docs/index.md \
            --db          docs/papers_db.json \
            --max-per-cat 200 \
            --conferences

      - name: Show DB stats
        run: |
          python3 -c "
          import json, pathlib
          db_path = pathlib.Path('docs/papers_db.json')
          if not db_path.exists():
              print('No DB found')
          else:
              db = json.loads(db_path.read_text())
              cats = {}
              for p in db.values():
                  for c in p.get('matched_categories', []):
                      if c != 'HF-Hot':
                          cats[c] = cats.get(c, 0) + 1
              print(f'Total: {len(db)} papers')
              for k, v in sorted(cats.items()):
                  print(f'  {k}: {v}')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs
          TOTAL=$(python3 -c "import json; print(len(json.load(open('docs/papers_db.json'))))" 2>/dev/null || echo "?")
          git diff --cached --quiet || git commit -m "📚 Conference update $(date +'%Y.%m.%d') — ${TOTAL} papers"
          git push || echo "Nothing to push"
