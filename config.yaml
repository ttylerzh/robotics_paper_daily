# ─────────────────────────────────────────────────
# paper_radar config.yaml
# ─────────────────────────────────────────────────
# Fully compatible with legacy config.yaml format
# categories -> category_name -> keywords list

categories:
  VLA:
    keywords:
      - Vision Language Action
      - Vision-Language-Action
      - VLA
      - robot foundation model
      - generalist robot policy
      - OpenVLA
      - pi0

  RL:
    keywords:
      - reinforcement learning
      - robot reinforcement learning
      - robotic reinforcement learning
      - offline reinforcement learning
      - online reinforcement learning
      - model-based reinforcement learning
      - model-free reinforcement learning
      - policy optimization
      - policy gradient
      - actor-critic
      - proximal policy optimization
      - soft actor-critic
      - reward learning

  Dexterous:
    keywords:
      - Dexterous Manipulation
      - Dexterous hand
      - Multifingered
      - Multi-fingered
      - Anthropomorphic
      - In-hand Manipulation
      - Tactile sensing
      - Bimanual
      - Manipulation

  Manipulation:
    keywords:
      - Robot Manipulation
      - Robotic Manipulation
      - Robot Learning
      - Imitation Learning
      - Deformable
      - Teleoperation
      - Learning from Demonstration
      - diffusion policy
      - behavior cloning
      - contact-rich manipulation


# ─────────────────────────────────────────────────
# Collection settings
# ─────────────────────────────────────────────────
settings:
  max_results_per_category: 20    # max arXiv papers per category (latest N, no date filter)
  hf_daily_limit: 50              # max HF daily papers to fetch
  arxiv_delay_seconds: 5          # pause before each arXiv request; CI shared IPs often need >3s
  arxiv_retry_attempts: 4         # retries after HTTP 429 rate limiting
  arxiv_page_size: 20             # keep API max_results aligned with max_results_per_category
  arxiv_hf_batch_size: 10         # fetch missing HF arXiv metadata in batches, not one-by-one
  arxiv_backoff_seconds: [30, 60, 120, 240]

# ─────────────────────────────────────────────────
# Retention / display limits
# ─────────────────────────────────────────────────
retention:
  max_per_category: 2000          # max DB papers to keep per non-HF category
  hf_hot_only_max: 500             # keep DB from growing with old HF-only papers

display:
  readme_max_hf_hot: 50
  readme_max_per_category: 500
  gitpage_max_hf_hot: 50
  gitpage_max_per_category: 500

# ─────────────────────────────────────────────────
# GitHub info (for GitPage badges)
# ─────────────────────────────────────────────────
user_name: "ttylerzh"
repo_name: "robotics_paper_daily"

show_badge: False
